<!DOCTYPE html>
<html lang="en">

<div class="min-h-screen flex items-center justify-center bg-white">
    <div class="w-full max-w-sm mx-auto p-6 border border-gray-200 rounded-xl text-center">
        <h1 class="text-2xl font-bold mb-2">Thank you for joining!</h1>
        <p class="text-gray-700 mb-6">You're on the waitlist. We'll reach out before we launch so you’re first to know.
        </p>
        {% if new_invite_code %}
        <div class="mb-4">
            <div class="text-xs text-gray-500 mb-1">Your invite code:</div>
            <div class="font-mono text-base bg-gray-100 rounded px-2 py-1 inline-block select-all">
                {{ new_invite_code }}
            </div>
        </div>
        {% endif %}
        <a href="/" class="text-indigo-600 underline">Back to Home</a>
    </div>
</div>
