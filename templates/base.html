<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sacred Work</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #ffffff;
            --surface: #ffffff;
            --surface-soft: #f4f1ed;
            --ink: #384551;
            --brand: #0f434e;
            --brand-strong: #051e23;
            --headline: #033c44;
            --border: #d7dde3;
            --shadow: 0 14px 36px rgba(15, 30, 35, 0.08);
            --radius: 8px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Inter", "Avenir Next", "Trebuchet MS", sans-serif;
            color: var(--ink);
            background: var(--bg);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        h1,
        h2,
        h3 {
            font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
            letter-spacing: 0.01em;
        }

        .wrap {
            width: 100%;
            padding: 0 0 4rem;
        }

        .shell {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .site-nav {
            position: sticky;
            top: 0;
            z-index: 30;
            width: 100%;
            transition: background 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
            background: rgba(244, 241, 237, 0.28);
            border-bottom: 1px solid transparent;
            backdrop-filter: blur(8px);
        }

        .site-nav.is-solid {
            background: rgba(255, 255, 255, 0.94);
            border-bottom-color: var(--border);
            box-shadow: 0 6px 18px rgba(15, 30, 35, 0.07);
        }

        .nav {
            display: flex;
            gap: 1rem;
            justify-content: space-between;
            align-items: center;
            min-height: 76px;
        }

        .brand {
            font-weight: 600;
            letter-spacing: 0.01em;
            color: var(--brand);
            text-decoration: none;
            text-transform: none;
            font-size: clamp(1.65rem, 2vw, 2rem);
            line-height: 1;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            box-shadow: var(--shadow);
        }

        label {
            display: block;
            margin-top: 0.75rem;
            font-size: 0.95rem;
        }

        input,
        select,
        textarea {
            width: 100%;
            margin-top: 0.3rem;
            padding: 0.68rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font: inherit;
            background: #fff;
        }

        button,
        .button {
            display: inline-block;
            margin-top: 1rem;
            background: var(--brand-strong);
            color: #fff;
            border: 0;
            border-radius: var(--radius);
            padding: 0.65rem 1rem;
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 0.01em;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
            box-shadow: 0 8px 18px rgba(5, 30, 35, 0.2);
        }

        button:hover,
        .button:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 24px rgba(5, 30, 35, 0.24);
            background: #0b3038;
        }

        .hint {
            color: #475569;
            font-size: 0.95rem;
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            justify-content: flex-end;
        }

        .links a {
            text-decoration: none;
            color: #334155;
            font-weight: 600;
            font-size: 0.95rem;
            border: 1px solid transparent;
            border-radius: var(--radius);
            padding: 0.35rem 0.7rem;
            transition: border-color 0.16s ease, background 0.16s ease, color 0.16s ease;
        }

        .links a:hover {
            border-color: var(--border);
            background: #fff;
            color: #0f172a;
        }

        ul.errorlist {
            color: #b91c1c;
            margin: 0.35rem 0;
        }

        .flash-list {
            display: grid;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .flash {
            padding: 0.9rem 1rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: #ecfeff;
        }

        .flash.error {
            background: #fef2f2;
            color: #991b1b;
        }

        @media (max-width: 700px) {
            .wrap {
                padding-top: 0;
            }

            .nav {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.6rem;
                padding: 0.8rem 0;
            }

            .links {
                justify-content: flex-start;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>

<body>
    <main class="wrap">
        <header class="site-nav" data-site-nav>
            <div class="shell">
                <div class="nav">
                    <a class="brand" href="{% url 'catalog:home' %}">Sacred Work</a>
                    <div class="links">
                        <a href="{% url 'catalog:marketplace' %}">Discover</a>
                        <a href="{% url 'waitlist:landing' %}">Practitioner Waitlist</a>
                        {% if user.is_authenticated %}
                        <a href="{% url 'accounts:dashboard' %}">Dashboard</a>
                        <a href="{% url 'accounts:logout' %}">Log out</a>
                        {% else %}
                        <a href="{% url 'accounts:login' %}">Log in</a>
                        <a href="{% url 'accounts:signup' %}">Sign up</a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </header>
        {% if messages %}
        <div class="shell" style="padding-top: 1rem;">
            <div class="flash-list">
                {% for message in messages %}
                <div class="flash {% if message.tags %}{{ message.tags }}{% endif %}">{{ message }}</div>
                {% endfor %}
            </div>
        </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
    <script>
        (function () {
            const nav = document.querySelector('[data-site-nav]');
            if (!nav) {
                return;
            }

            const hero = document.querySelector('.home-hero');
            if (!hero) {
                nav.classList.add('is-solid');
                return;
            }

            const observer = new IntersectionObserver(
                function (entries) {
                    const entry = entries[0];
                    if (!entry) {
                        return;
                    }
                    nav.classList.toggle('is-solid', !entry.isIntersecting);
                },
                {
                    threshold: 0.15,
                }
            );

            observer.observe(hero);
        })();
    </script>
</body>

</html>
