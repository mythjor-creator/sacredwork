<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sacred Work</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f7f3ea;
            --surface: #fffdfa;
            --surface-soft: #f6f8f3;
            --ink: #1f2937;
            --brand: #0f766e;
            --brand-soft: #ccfbf1;
            --accent: #c26d3a;
            --border: #d6d3d1;
            --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Nunito Sans", "Avenir Next", "Trebuchet MS", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 12% 16%, #fff2c9 0%, transparent 35%),
                radial-gradient(circle at 88% 10%, #d9f3ee 0%, transparent 32%),
                linear-gradient(180deg, #f7f3ea 0%, #eef4f4 100%);
            min-height: 100vh;
        }

        h1,
        h2,
        h3 {
            font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
            letter-spacing: 0.01em;
        }

        .wrap {
            max-width: 980px;
            margin: 0 auto;
            padding: 2rem 1rem 4rem;
        }

        .nav {
            display: flex;
            gap: 1rem;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            background: rgba(255, 253, 250, 0.78);
            border: 1px solid rgba(214, 211, 209, 0.7);
            border-radius: 999px;
            padding: 0.65rem 0.95rem;
            backdrop-filter: blur(6px);
        }

        .brand {
            font-weight: 800;
            letter-spacing: 0.04em;
            color: var(--brand);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.86rem;
            line-height: 1;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            box-shadow: var(--shadow);
        }

        label {
            display: block;
            margin-top: 0.75rem;
            font-size: 0.95rem;
        }

        input,
        select,
        textarea {
            width: 100%;
            margin-top: 0.3rem;
            padding: 0.65rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            font: inherit;
            background: #fff;
        }

        button,
        .button {
            display: inline-block;
            margin-top: 1rem;
            background: var(--brand);
            color: #fff;
            border: 0;
            border-radius: 999px;
            padding: 0.65rem 1rem;
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
            box-shadow: 0 8px 20px rgba(15, 118, 110, 0.22);
        }

        button:hover,
        .button:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 24px rgba(15, 118, 110, 0.28);
        }

        .hint {
            color: #475569;
            font-size: 0.95rem;
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            justify-content: flex-end;
        }

        .links a {
            text-decoration: none;
            color: #334155;
            font-weight: 600;
            border: 1px solid transparent;
            border-radius: 999px;
            padding: 0.35rem 0.7rem;
            transition: border-color 0.16s ease, background 0.16s ease, color 0.16s ease;
        }

        .links a:hover {
            border-color: var(--border);
            background: #fff;
            color: #0f172a;
        }

        ul.errorlist {
            color: #b91c1c;
            margin: 0.35rem 0;
        }

        .flash-list {
            display: grid;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .flash {
            padding: 0.9rem 1rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #ecfeff;
        }

        .flash.error {
            background: #fef2f2;
            color: #991b1b;
        }

        @media (max-width: 700px) {
            .wrap {
                padding-top: 1rem;
            }

            .nav {
                border-radius: 18px;
                flex-direction: column;
                align-items: stretch;
            }

            .links {
                justify-content: center;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>

<body>
    <main class="wrap">
        <div class="nav">
            <a class="brand" href="{% url 'catalog:home' %}">Sacred Work</a>
            <div class="links">
                <a href="{% url 'catalog:marketplace' %}">Discover</a>
                <a href="{% url 'waitlist:landing' %}">Practitioner Waitlist</a>
                {% if user.is_authenticated %}
                <a href="{% url 'accounts:dashboard' %}">Dashboard</a>
                <a href="{% url 'accounts:logout' %}">Log out</a>
                {% else %}
                <a href="{% url 'accounts:login' %}">Log in</a>
                <a href="{% url 'accounts:signup' %}">Sign up</a>
                {% endif %}
            </div>
        </div>
        {% if messages %}
        <div class="flash-list">
            {% for message in messages %}
            <div class="flash {% if message.tags %}{{ message.tags }}{% endif %}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>

</html>
