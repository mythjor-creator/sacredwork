<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sacred Work</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f7f3ea;
            --surface: #fffdfa;
            --ink: #1f2937;
            --brand: #0f766e;
            --brand-soft: #ccfbf1;
            --border: #d6d3d1;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Avenir Next", "Nunito Sans", sans-serif;
            color: var(--ink);
            background: radial-gradient(circle at top right, #fef9c3 0%, var(--bg) 40%, #f1f5f9 100%);
            min-height: 100vh;
        }

        .wrap {
            max-width: 840px;
            margin: 0 auto;
            padding: 2rem 1rem 4rem;
        }

        .nav {
            display: flex;
            gap: 1rem;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .brand {
            font-weight: 700;
            letter-spacing: 0.02em;
            color: var(--brand);
            text-decoration: none;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.05);
        }

        label {
            display: block;
            margin-top: 0.75rem;
            font-size: 0.95rem;
        }

        input,
        select,
        textarea {
            width: 100%;
            margin-top: 0.3rem;
            padding: 0.65rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            font: inherit;
            background: #fff;
        }

        button,
        .button {
            display: inline-block;
            margin-top: 1rem;
            background: var(--brand);
            color: #fff;
            border: 0;
            border-radius: 10px;
            padding: 0.65rem 1rem;
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
        }

        .hint {
            color: #475569;
            font-size: 0.95rem;
        }

        .links a {
            margin-right: 0.75rem;
        }

        ul.errorlist {
            color: #b91c1c;
            margin: 0.35rem 0;
        }

        .flash-list {
            display: grid;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .flash {
            padding: 0.9rem 1rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #ecfeff;
        }

        .flash.error {
            background: #fef2f2;
            color: #991b1b;
        }
    </style>
</head>

<body>
    <main class="wrap">
        <div class="nav">
            <a class="brand" href="{% url 'catalog:marketplace' %}">Sacred Work</a>
            <div class="links">
                <a href="{% url 'catalog:marketplace' %}">Discover</a>
                {% if user.is_authenticated %}
                <a href="{% url 'accounts:dashboard' %}">Dashboard</a>
                <a href="{% url 'accounts:logout' %}">Log out</a>
                {% else %}
                <a href="{% url 'accounts:login' %}">Log in</a>
                <a href="{% url 'accounts:signup' %}">Sign up</a>
                {% endif %}
            </div>
        </div>
        {% if messages %}
        <div class="flash-list">
            {% for message in messages %}
            <div class="flash {% if message.tags %}{{ message.tags }}{% endif %}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>

</html>
