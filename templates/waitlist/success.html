<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | clairbook</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="min-h-screen bg-white flex items-center justify-center px-4">
    <main class="w-full max-w-sm">
        <section class="w-full rounded-2xl border border-gray-200 bg-white p-10 text-center shadow-sm">
            <h1 class="mb-6 text-5xl leading-tight font-bold text-gray-800">Thank you for joining!</h1>
            <p class="text-xl leading-relaxed text-gray-700">You're on the waitlist. We'll reach out before we launch so
                you're first to know.</p>
            {% if new_invite_code %}
            <div class="mt-6 mb-2">
                <p class="mb-2 text-sm text-gray-500">Your invite code:</p>
                <div class="inline-block rounded-lg bg-gray-100 px-3 py-2 font-mono text-base text-gray-900">
                    {{ new_invite_code }}
                </div>
            </div>
            {% endif %}
            <a href="/" class="mt-8 inline-block text-xl text-gray-700 underline">Back to Home</a>
        </section>
    </main>
</body>

</html>
