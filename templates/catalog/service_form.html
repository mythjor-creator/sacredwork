{% extends 'base.html' %}

{% block content %}
<section class="card">
    <h1>{{ form_title }}</h1>
    <p class="hint">This service will appear on {{ profile.business_name }} once your profile is visible.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save service</button>
    </form>
</section>
{% endblock %}
