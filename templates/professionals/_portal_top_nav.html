<details class="portal-user-menu">
    <summary class="mini-avatar-link" title="Open account menu" aria-label="Open account menu">
        {% if profile.profile_photo %}
        <img src="{{ profile.profile_photo.url }}" alt="{{ profile.display_name }} profile">
        {% elif profile.profile_image_url %}
        <img src="{{ profile.profile_image_url }}" alt="{{ profile.display_name }} profile">
        {% else %}
        <span class="mini-avatar-fallback">{{ profile.display_name|slice:':2' }}</span>
        {% endif %}
    </summary>
    <div class="portal-user-dropdown">
        <span class="portal-user-label">{{ profile.display_name }}</span>
        <a href="{% url 'catalog:professional_detail' profile.pk %}">Public profile</a>
        <a href="{% url 'accounts:settings' %}">Account settings</a>
        <a href="{% url 'pages:terms' %}">Help</a>
        <a href="{% url 'accounts:logout' %}">Log out</a>
    </div>
</details>
