{% extends 'base.html' %}

{% block content %}
<section class="card">
    <h1>Professional onboarding</h1>
    <p class="hint">Tell clients about your work. New profiles are queued for moderation review.</p>
    <p class="hint">After this step, you can add service tiers, hours, gallery photos, and optional credentials.</p>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Submit profile</button>
    </form>
</section>
{% endblock %}
