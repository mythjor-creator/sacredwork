{% extends 'base.html' %}

{% block content %}
<section class="card">
    <h1>Create your account</h1>
    <p class="hint">Choose Professional if you want to offer services on clairbook.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Create account</button>
    </form>
    <p class="hint">Already have an account? <a href="{% url 'accounts:login' %}">Log in</a>.</p>
</section>
{% endblock %}
