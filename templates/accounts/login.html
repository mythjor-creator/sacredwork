{% extends 'base.html' %}

{% block content %}
<section class="card">
    <h1>Log in</h1>
    <form method="post">
        {% csrf_token %}
        {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
        {{ form.as_p }}
        <button type="submit">Log in</button>
    </form>
    <p class="hint">No account yet? <a
            href="{% url 'accounts:signup' %}{% if next %}?next={{ next|urlencode }}{% endif %}">Sign up</a>.</p>
</section>
{% endblock %}
